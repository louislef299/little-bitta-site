<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Little Bitta Granola</title>
  <link rel="stylesheet" href="/admin.css">
  <script src="//unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script type="module" src="/admin.ts"></script>
</head>
<body x-data="adminPanel()" x-init="init()">

  <!-- Login Form -->
  <div x-show="!authenticated" class="login-container">
    <h1>Little Bitta Admin</h1>
    <form @submit.prevent="login">
      <div>
        <label for="username">Username</label>
        <input
          id="username"
          x-model="credentials.username"
          type="text"
          placeholder="Enter username"
          required
          autofocus
        >
      </div>
      <div>
        <label for="password">Password</label>
        <input
          id="password"
          x-model="credentials.password"
          type="password"
          placeholder="Enter password"
          required
        >
      </div>
      <button type="submit" class="btn-primary">Login</button>
      <div x-show="loginError" class="alert-error" x-text="loginError"></div>
    </form>
  </div>

  <!-- Dashboard -->
  <div x-show="authenticated" class="dashboard">
    <header>
      <h1>Little Bitta Admin</h1>
      <div class="user-info">
        <span>Welcome, <strong x-text="username"></strong></span>
        <button @click="logout" class="btn-secondary">Logout</button>
      </div>
    </header>

    <div class="welcome-section">
      <h2>Welcome to the Admin Panel</h2>
      <p>
        This is where you'll manage your Little Bitta Granola store.<br>
        Product management and order tracking features coming soon!
      </p>
    </div>
  </div>

</body>
</html>
