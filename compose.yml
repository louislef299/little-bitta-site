---
services:
  bun:
    build: .
    container_name: bun
    env_file: ".env.production"
    environment:
    - NODE_ENV=production
    networks:
    - net
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
    - "443:443"
    volumes:
    - ./Caddyfile:/etc/caddy/Caddyfile
    - ./caddy_data:/data
    environment:
    - DOMAIN=${DOMAIN:-localhost}
    networks:
    - net
    depends_on:
    - bun

  db:
    image: mysql:9.5
    container_name: db
    environment:
    - MYSQL_ROOT_PASSWORD=password
    - MYSQL_DATABASE=little_bitta
    ports:
    - 3306:3306
    networks:
    - net
    volumes:
    - data:/var/lib/mysql
    - ./config/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  net:

volumes:
  data:
