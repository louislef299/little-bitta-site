---
services:
  bun:
    build: .
    container_name: bun-bitta
    ports:
    - "3000:3000"
    environment:
    - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy
    networks:
    - net

  db:
    image: mysql:9.5
    container_name: bitta-db
    ports:
    - "3306:3306"
    environment:
    - MYSQL_ROOT_PASSWORD=password
    - MYSQL_DATABASE=little_bitta
    networks:
    - net
    volumes:
    - data:/var/lib/mysql
    - ./scripts/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  net:

volumes:
  data: