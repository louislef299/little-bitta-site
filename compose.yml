---
services:
  web:
    build: .
    ports:
    - "5173:5173"
    volumes:
    - .:/app
    - /app/node_modules
    environment:
    - NODE_ENV=development
    depends_on:
    - db

  db:
    image: mysql:8
    ports:
    - "3306:3306"
    environment:
    - MYSQL_ROOT_PASSWORD=password
    - MYSQL_DATABASE=little_bitta
    volumes:
    - data:/var/lib/mysql

volumes:
  data: