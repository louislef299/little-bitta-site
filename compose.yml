---
services:
  bun:
    build: .
    container_name: bun
    env_file: ".env.production"
    environment:
    - NODE_ENV=production
    networks:
    - net
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
    - "443:443"
    volumes:
    - ./Caddyfile:/etc/caddy/Caddyfile
    - ./caddy_data:/data
    - ./certs:/etc/caddy/certs:ro
    environment:
    - DOMAIN=${DOMAIN:-localhost}
    - CERT_FILE=/etc/caddy/certs/localhost.pem
    - CERT_KEY=/etc/caddy/certs/localhost-key.pem
    networks:
    - net
    depends_on:
    - bun

  db:
    image: postgres:18
    container_name: db
    environment:
    - POSTGRES_USER=postgres
    - POSTGRES_PASSWORD=password
    - POSTGRES_DB=little_bitta
    ports:
    - 5432:5432
    networks:
    - net
    volumes:
    - data:/var/lib/postgresql
    - ./config/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d little_bitta"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  net:

volumes:
  data:
