---
name: Bun CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  bun-lint:
    name: Bun Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v2
    - run: bun install && bun run check
  bun-test:
    name: Bun Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v2
    - run: bun install && bun test

